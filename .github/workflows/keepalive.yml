name: Keep Supabase Awake

# Mantém o projeto Supabase (plano grátis) ativo, evitando que pause
# por inatividade. Faz um pedido leve à API REST de 6 em 6 horas.
# A chave usada é a "anon" (pública, protegida por RLS) — segura no repositório.

on:
  schedule:
    - cron: "0 */6 * * *"   # a cada 6 horas
  workflow_dispatch:          # permite correr manualmente no separador Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          URL="https://vtcaelplajlkoehdktgq.supabase.co/rest/v1/config?select=id&limit=1&apikey=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0Y2FlbHBsYWpsa29laGRrdGdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NjY2MDMsImV4cCI6MjA5ODA0MjYwM30.B7wAD1UyLRWs06ZMl_WLUKNgMEe2Ft1uJ_ud9fNmj_o"
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" "$URL")
          echo "Supabase respondeu: HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::error::Supabase não respondeu 200 (recebido $CODE)"
            exit 1
          fi
